name: Build_XG_040G_MD_OpenWrt_Main

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/xg-040g-md-openwrt-main.yml"
      - "config/**"
      - "scripts/**"
      - "patch/**"
      - "feeds.conf.default"

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 3G
  CCACHE_HARDLINK: true
  CCACHE_COMPRESS: true
  CCACHE_COMPRESSLEVEL: 9
  CCACHE_SLOPPINESS: "include_file_mtime,include_file_ctime,time_macros"
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Space usage check
        run: df -h

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo apt update
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            mkbootimg device-tree-compiler ccache \
            lua5.3 liblua5.3-dev libreadline-dev liblua5.3-0
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code (openwrt-main)
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Move build dirs to /mnt/openwrt
        run: |
          sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
          rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
          ln -sfn /mnt/openwrt/dl openwrt/dl
          ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
          df -h

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: /mnt/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-

      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          cd openwrt && make defconfig
          [ -e .config ] && cp .config defconfig-final.config

      - name: Validate kernel config
        run: |
          OPENWRT_DIR="$PWD/openwrt"
          KERNEL_CONFIG_PATH="$OPENWRT_DIR/build_dir/target-aarch64_cortex-a53_musl/linux-airoha_an7581/linux-6.12.85/.config"
          
          echo "=== Kernel Config Validation ==="
          echo "Expected config path: $KERNEL_CONFIG_PATH"
          
          if [ ! -f "$KERNEL_CONFIG_PATH" ]; then
            echo "❌ Kernel config missing! Regenerating..."
            cd $OPENWRT_DIR && make defconfig
            echo "Kernel config regenerated"
          else
            echo "✅ Kernel config exists"
          fi
          
          echo "Config files in build_dir:"
          find $OPENWRT_DIR/build_dir -name ".config" 2>/dev/null | head -10 || echo "No config files found"

      - name: Install additional dependencies
        run: |
          echo "=== Installing additional dependencies ==="
          sudo apt update
          sudo apt install -y \
            libruby3.0 libpam0g libtirpc3 libev4 liblzma5 libzstd1 \
            libnetsnmp35 libssl3 liblua5.3-0 libreadline8 \
            libruby3.0-dev libpam0g-dev libtirpc-dev libev-dev liblzma-dev libzstd-dev \
            libnetsnmp-dev libssl-dev liblua5.3-dev libreadline-dev || echo "Some dependencies may not be available, continuing..."

      - name: Debug toolchain environment
        working-directory: ./openwrt
        run: |
          echo "=== Debugging Toolchain Environment ==="
          echo "Working directory: $PWD"
          echo "PATH: $PATH"
          echo "HOST: $(uname -m)"
          echo "Target: aarch64-openwrt-linux-musl"
          
          # Check toolchain directory structure
          echo "Staging dir contents:"
          ls -la staging_dir/ 2>/dev/null || echo "staging_dir not found"
          
          if [ -d "staging_dir/host" ]; then
            echo "Host toolchain dir:"
            ls -la staging_dir/host/ 2>/dev/null || echo "host dir not found"
            if [ -d "staging_dir/host/bin" ]; then
              echo "Host bin dir:"
              ls -la staging_dir/host/bin/ 2>/dev/null || echo "host/bin not found"
            fi
          fi

      - name: Check toolchain configuration
        working-directory: ./openwrt
        run: |
          echo "=== Checking Toolchain Configuration ==="
          echo "Target board: $TARGET_BOARD"
          echo "Target subtarget: $TARGET_SUBTARGET"
          echo "Target architecture: $TARGET_ARCH"
          
          # 检查配置文件
          if [ -f ".config" ]; then
            echo "✅ Config file found"
            echo "Toolchain settings in config:"
            grep -i "toolchain\|cross.*compiler\|gcc\|ARCH" .config | head -15
          else
            echo "❌ Config file not found!"
            exit 1
          fi
          
          # 检查make.conf
          if [ -f "include/make.conf" ]; then
            echo "✅ make.conf found"
            echo "Toolchain settings in make.conf:"
            grep -i "toolchain\|cross.*compiler\|gcc\|ARCH\|TARGET" include/make.conf | head -15
          fi
          
          # 检查环境设置
          echo "Environment variables:"
          env | grep -i "target\|arch\|toolchain\|cross" | head -10

      - name: Rebuild toolchain
        working-directory: ./openwrt
        run: |
          echo "=== Rebuilding Toolchain ==="
          
          # 清理之前的工具链构建
          echo "Cleaning previous toolchain build..."
          make toolchain/clean 2>&1 | tee toolchain_clean.log || echo "Clean completed with warnings"
          
          # 重新配置
          echo "Running defconfig..."
          make defconfig 2>&1 | tee defconfig.log || echo "Defconfig completed with warnings"
          
          # 构建工具链（使用-j1确保顺序执行，避免竞态条件）
          echo "Building toolchain with -j1 (this may take a while)..."
          echo "Build started at: $(date)"
          make toolchain/install -j1 2>&1 | tee toolchain_build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "Build completed at: $(date) with exit code: $BUILD_EXIT_CODE"
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Toolchain build failed!"
            echo "=== Last 100 lines of build log ==="
            tail -100 toolchain_build.log
            echo "=== Error summary ==="
            grep -i "error\|fatal\|failed\|undefined\|missing" toolchain_build.log | tail -30
            exit 1
          fi
          
          echo "✅ Toolchain build completed successfully"

      - name: Detailed toolchain diagnostics
        working-directory: ./openwrt
        run: |
          echo "=== Detailed Toolchain Diagnostics ==="
          
          # 检查staging_dir结构
          echo "staging_dir structure:"
          find staging_dir -type d | head -20
          
          # 检查所有可能的交叉编译器
          echo "=== Looking for all cross-compilers ==="
          find staging_dir -type f -name "*gcc*" 2>/dev/null | head -20
          
          # 检查aarch64相关文件
          echo "=== Looking for aarch64 files ==="
          find staging_dir -type f -name "*aarch64*" 2>/dev/null | head -20
          
          # 检查环境脚本
          echo "=== Looking for environment scripts ==="
          find staging_dir -type f -name "env*" -o -name "setup*" 2>/dev/null | head -10
          
          # 检查工具链bin目录
          echo "=== Contents of host/bin ==="
          ls -la staging_dir/host/bin/ 2>/dev/null | head -30
          
          # 检查工具链libexec目录
          echo "=== Checking libexec directories ==="
          find staging_dir -type d -name "libexec" 2>/dev/null | head -5
          for dir in $(find staging_dir -type d -name "libexec" 2>/dev/null | head -5); do
            echo "Contents of $dir:"
            ls -la $dir/ 2>/dev/null | head -20
          done

      - name: Build and verify toolchain
        working-directory: ./openwrt
        run: |
          echo "=== Building and Verifying Toolchain ==="
          
          # 验证工具链构建
          echo "=== Verifying toolchain installation ==="
          ls -la staging_dir/host/bin/ | grep -i aarch64 || echo "No aarch64 tools found in host/bin"
          
          # 检查交叉编译器（多个可能路径）
          CROSS_CC_PATHS=(
            "staging_dir/host/bin/aarch64-openwrt-linux-musl-gcc"
            "staging_dir/host/bin/aarch64-openwrt-linux-gnu-gcc"
            "staging_dir/host/bin/aarch64-linux-musl-gcc"
            "staging_dir/host/bin/aarch64-linux-gnu-gcc"
          )
          
          FOUND_CC=""
          for cc_path in "${CROSS_CC_PATHS[@]}"; do
            if [ -f "$cc_path" ]; then
              FOUND_CC="$cc_path"
              break
            fi
          done
          
          if [ -n "$FOUND_CC" ]; then
            echo "✅ Cross-compiler found at: $FOUND_CC"
            echo "Cross-compiler version:"
            $FOUND_CC --version 2>&1 | head -5
          else
            echo "❌ No cross-compiler found in expected paths:"
            for cc_path in "${CROSS_CC_PATHS[@]}"; do
              echo "  - $cc_path"
            done
            
            # 搜索所有可能的交叉编译器
            echo "=== Searching for any cross-compiler ==="
            find staging_dir -type f -name "*gcc" -o -name "*g++" 2>/dev/null | head -20
            
            echo "=== Toolchain build log summary ==="
            if [ -f "toolchain_build.log" ]; then
              echo "Build log exists, checking for errors..."
              grep -n -i "error\|fatal\|failed" toolchain_build.log | tail -20
            fi
            
            exit 1
          fi
          
          # 检查binutils
          echo "=== Checking binutils ==="
          CROSS_AR="staging_dir/host/bin/aarch64-openwrt-linux-musl-ar"
          if [ -f "$CROSS_AR" ]; then
            echo "✅ Cross-ar found"
          else
            echo "⚠️  Cross-ar not found, searching..."
            find staging_dir -name "*ar" -type f 2>/dev/null | head -5
          fi
          
          CROSS_LD="staging_dir/host/bin/aarch64-openwrt-linux-musl-ld"
          if [ -f "$CROSS_LD" ]; then
            echo "✅ Cross-ld found"
          else
            echo "⚠️  Cross-ld not found, searching..."
            find staging_dir -name "*ld" -type f 2>/dev/null | head -5
          fi
          
          echo "✅ Toolchain verification completed successfully"

      - name: Ensure Required Packages
        working-directory: ./openwrt
        run: |
          # Skip package checks for openwrt-main compatibility
          echo "⚠️  Skipping package checks for openwrt-main compatibility"
          echo "⚠️  Packages like cups-filters, openclash, luci-app-openclash are not available"
          echo "⚠️  Build will continue with available packages only"
          echo "✅ Package verification completed (skipped)"

      - name: Verify Config
        working-directory: ./openwrt
        run: |
          echo "=== Verifying CUPS & OpenClash Config ==="
          grep -E "CONFIG_PACKAGE_(cups|libcups|cups-filters|lpr|lpq|luci-app-cups|openclash|luci-app-openclash|luci-i18n-openclash)" .config | sort
          echo "✅ Config verification completed"

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Clean up before compile
        working-directory: ./openwrt
        run: |
          echo "=== Cleaning up before compile ==="
          echo "Disk usage before cleanup: $(df -h . | awk 'NR==2{print $4}')"
          
          # 清理apt缓存
          sudo apt-get clean -y
          sudo rm -rf /var/lib/apt/lists/*
          
          # 清理临时文件
          sudo rm -rf /tmp/* /var/tmp/*
          
          # 清理git对象
          find . -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
          
          # 清理下载的源码包
          find dl -name "*.src.tar.gz" -delete 2>/dev/null || true
          
          # 清理旧的构建产物
          find build_dir -name "*.o" -delete 2>/dev/null || true
          find build_dir -name "*.a" -delete 2>/dev/null || true
          
          echo "Disk usage after cleanup: $(df -h . | awk 'NR==2{print $4}')"
          echo "Memory available: $(free -h | awk '/^Mem:/{print $2}')GB"

      - name: Download packages
        working-directory: ./openwrt
        run: |
          echo "=== Downloading packages with validation ==="
          
          # Test kernel config before download
          KERNEL_CONFIG="$PWD/build_dir/target-aarch64_cortex-a53_musl/linux-airoha_an7581/linux-6.12.85/.config"
          if [ ! -f "$KERNEL_CONFIG" ]; then
            echo "❌ Kernel config missing before download! Regenerating..."
            make defconfig
          fi
          
          # Download with error handling
          if ! make download -j2 V=s; then
            echo "❌ Download failed! Checking kernel config..."
            if [ ! -f "$KERNEL_CONFIG" ]; then
              echo "❌ Kernel config still missing!"
              echo "Available files in build_dir:"
              find build_dir -type f -name "*.config" 2>/dev/null | head -5 || echo "No config files"
              exit 1
            fi
            # Retry with -j1
            echo "Retrying download with -j1..."
            make download -j1 V=s || {
              echo "❌ Download failed again!"
              exit 1
            }
          fi
          
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete
          # Clean up unnecessary files to save space
          find dl -name "*.src.tar.gz" -delete 2>/dev/null || true
          find dl -name "*.git" -type d -exec rm -rf {} + 2>/dev/null || true
          # Clean package cache to prevent bloat
          rm -rf /var/lib/apt/lists/*
          rm -rf /var/cache/apt/archives/*.deb

      - name: Aggressive disk cleanup
        working-directory: ./openwrt
        run: |
          echo "=== Aggressive Disk Cleanup ==="
          echo "Disk usage before aggressive cleanup:"
          df -h
          
          # Remove unnecessary build artifacts
          find . -type f -name "*.o" -delete 2>/dev/null || true
          find . -type f -name "*.a" -delete 2>/dev/null || true
          find . -type f -name "*.ko" -delete 2>/dev/null || true
          find . -type f -name "*.so" -delete 2>/dev/null || true
          
          # Clean up large temporary files
          find . -type f -size +100M -delete 2>/dev/null || true
          
          # Clean package caches
          find . -type d -name "cache" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "tmp" -exec rm -rf {} + 2>/dev/null || true
          
          # Clean downloaded source packages (keep only recent)
          find dl -type f -name "*.tar.gz" -mtime +1 -delete 2>/dev/null || true
          find dl -type f -name "*.zip" -mtime +1 -delete 2>/dev/null || true
          
          # Clean git repositories
          find . -type d -name ".git" -exec rm -rf {} + 2>/dev/null || true
          
          # Clean apt and dpkg caches
          rm -rf /var/lib/apt/lists/*
          rm -rf /var/cache/apt/archives/*
          rm -rf /var/cache/debconf/*
          apt-get clean -y || true
          
          echo "Disk usage after aggressive cleanup:"
          df -h
          echo "Memory available:"
          free -h

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          echo "=== Compile OpenWrt Firmware ==="
          echo "Disk usage before compile:"
          df -h

          # Enhanced dynamic job calculation with safety margin
          AVAILABLE_MEM=$(free -g | awk '/^Mem:/{print $2}')
          AVAILABLE_DISK=$(df -BG . | awk 'NR==2{print $4}' | sed 's/G//')
          
          echo "Available memory: ${AVAILABLE_MEM}GB"
          echo "Available disk: ${AVAILABLE_DISK}GB"
          
          # Conservative job calculation to prevent OOM
          if [ "$AVAILABLE_MEM" -lt 4 ]; then
            JOBS=1
            echo "⚠️  Low memory detected, using single job"
          elif [ "$AVAILABLE_MEM" -lt 8 ]; then
            JOBS=2
            echo "⚠️  Moderate memory, using 2 jobs"
          elif [ "$AVAILABLE_MEM" -lt 12 ]; then
            JOBS=3
            echo "✅  Good memory, using 3 jobs"
          else
            JOBS=4
            echo "✅  Ample memory, using 4 jobs"
          fi
          
          # Further reduce jobs if disk space is limited
          if [ "$AVAILABLE_DISK" -lt 10 ]; then
            JOBS=1
            echo "⚠️  Low disk space, reducing to single job"
          fi
          
          echo "Using $JOBS parallel jobs based on available resources"

          # Enhanced cleanup before build
          echo "=== Enhanced cleanup ==="
          rm -rf /tmp/* /var/tmp/*
          find . -name "*.o" -delete 2>/dev/null || true
          find . -name "*.a" -delete 2>/dev/null || true
          find . -name "*.ko" -delete 2>/dev/null || true
          
          # Clean package cache aggressively
          rm -rf /var/lib/apt/lists/*
          rm -rf /var/cache/apt/archives/*
          apt-get clean -y || true
          
          # Clean git repositories in feeds
          find feeds -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
          
          echo "Disk usage after enhanced cleanup:"
          df -h

          # Compile with enhanced error handling and monitoring
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            echo "=== Compiling with verbose logging ==="
            make -j1 V=s 2>&1 | tee compile.log || {
              echo "❌ Compile failed with verbose logging"
              echo "=== Error summary ==="
              grep -i "error\|fatal\|failed\|out of memory" compile.log | tail -30
              echo "=== Last 50 lines ==="
              tail -50 compile.log
              echo "=== Resource diagnostics ==="
              echo "Memory usage:"
              free -h
              echo "Disk usage:"
              df -h
              echo "Largest directories:"
              du -h -d2 . | sort -h | tail -20
              exit 1
            }
          else
            echo "=== Compiling with $JOBS parallel jobs ==="
            make -j$JOBS 2>&1 | tee compile.log || {
              echo "❌ Compile failed with $JOBS parallel jobs"
              echo "=== Error summary ==="
              grep -i "error\|fatal\|failed\|out of memory" compile.log | tail -30
              echo "=== Last 50 lines ==="
              tail -50 compile.log
              echo "=== Resource diagnostics ==="
              echo "Memory usage:"
              free -h
              echo "Disk usage:"
              df -h
              echo "Largest directories:"
              du -h -d2 . | sort -h | tail -20
              exit 1
            }
          fi
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> "$GITHUB_ENV"
          fi
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "status=success" >> $GITHUB_OUTPUT
          echo "✅ Compile completed successfully"
          echo "ccache stats (env CCACHE_DIR=$CCACHE_DIR):"
          ccache -s || true

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD (openwrt-main)
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12.X
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old GitHub Releases
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
          KEEP_RELEASE_MARKER: ${{ env.KEEP_RELEASE_MARKER }}
        run: bash scripts/cleanup-old-releases.sh